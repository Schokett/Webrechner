<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Webrechner</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    <section class="main-container">
      <div class="display-container">
        <p id="secent-display" class="secent-display">0</p>
        <p id="first-display" class="first-display">0</p>
      </div>
      <div id="allKeys" class="keys-container">
        <button class="key" type="number">7</button>
        <button class="key" type="number">8</button>
        <button class="key" type="number">9</button>
        <button class="key">/</button>
        <button class="key" type="number">4</button>
        <button class="key" type="number">5</button>
        <button class="key" type="number">6</button>
        <button class="key">*</button>
        <button class="key" type="number">1</button>
        <button class="key" type="number">2</button>
        <button class="key" type="number">3</button>
        <button class="key">-</button>
        <button class="key">CE</button>
        <button class="key" type="number">0</button>
        <button class="key">=</button>
        <button class="key">+</button>
      </div>

      <div class="site-container">
        <p id="text-container" class="text-container">0</p>
      </div>
    </section>
  </body>
</html>
