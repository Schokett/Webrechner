<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Webrechner</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    <section class="main-container">
      <div class="display-container">
        <p id="secent-display" class="secent-display">0</p>
        <p id="first-display" class="first-display">0</p>
      </div>
      <div id="allKeys" class="keys-container">
        <button class="key">7</button>
        <button class="key">8</button>
        <button class="key">9</button>
        <button class="key" onclick="handleOperator('/')">/</button>
        <button class="key">4</button>
        <button class="key">5</button>
        <button class="key">6</button>
        <button class="key" onclick="handleOperator('*')">*</button>
        <button class="key">1</button>
        <button class="key">2</button>
        <button class="key">3</button>
        <button class="key" onclick="handleOperator('-')">-</button>
        <button class="key" onclick="deleteButton()">CE</button>
        <button class="key">0</button>
        <button class="key" onclick="sideDisplayContainerCalculation()">=</button>
        <button class="key" onclick="handleOperator('+')">+</button>
      </div>

      <div class="site-container">
        <div class="result-container">
          <p id="chain-container" class="text-container"></p>
          <p id="result-container" class="text-container"></p>
        </div>
      </div>
    </section>
  </body>
</html>
